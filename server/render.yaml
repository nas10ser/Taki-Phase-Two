# TAKI Telegram bot — Render Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# One-time setup (owner does this in the Render dashboard — only you can, it's
# your account):
#   1) Render → New → Blueprint → connect the GitHub repo (nas10ser/Taki-Phase-Two)
#      → Render reads this file (server/render.yaml).
#   2) When prompted, paste the SECRET env-var values (the keys marked
#      `sync: false` below). They are the same values already in server/.env.
#   3) Create / Deploy. On boot the bot auto-registers its Telegram webhook
#      using Render's public URL (RENDER_EXTERNAL_URL) — no extra steps.
#
# IMPORTANT: the bot token can run in ONE place at a time. Once Render is live,
# stop the local PM2 bot (`pm2 stop taki-bot`) so they don't fight over Telegram.
#
# Plan: `free`. Render free sleeps after ~15 min idle, so the bot runs a built-in
# self-ping keep-alive (hits its own /health every 10 min via RENDER_EXTERNAL_URL)
# that keeps it awake 24/7 — no paid plan, no external uptime service needed.
# (One free web service kept awake ≈ 744 h/mo, within the 750 h free allowance.)
services:
  - type: web
    name: taki-bot
    runtime: node
    rootDir: server
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node bot.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: APP_URL
        value: https://taki-test-eight.vercel.app
      - key: NODE_VERSION
        value: "20"
      # ── Secrets — paste the values from server/.env in the Render dashboard ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: BOT_GATEWAY_SECRET
        sync: false
      # ── WhatsApp (optional) — fill these only when you activate WhatsApp ──
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
